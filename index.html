<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>警備員配置管理システム — 越前警備</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#f8fafc;color:#0f172a;-webkit-text-size-adjust:100%}
:root{--accent:#1d4ed8;--accent-light:#dbeafe;--danger:#dc2626;--danger-light:#fee2e2;--warn:#d97706;--warn-light:#fef3c7;--success:#059669;--success-light:#d1fae5;--bg:#f8fafc;--bg2:#fff;--bg3:#f1f5f9;--text:#0f172a;--text2:#475569;--border:#e2e8f0}
.container{max-width:960px;margin:0 auto;padding:0 12px 40px}
.header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 12px;border-bottom:2px solid var(--accent);margin-bottom:12px}
.header h1{font-size:20px;font-weight:700}
.header p{font-size:11px;color:var(--text2);margin:2px 0 0}
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:600;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff;padding:8px 14px;font-size:13px}
.btn-outline{border:1px solid var(--border);background:var(--bg2);color:var(--text2);padding:6px 12px;font-size:12px}
.btn-success{background:#16a34a;color:#fff;padding:6px 12px;font-size:12px}
.btn-copy{border:1px solid var(--border);background:var(--bg2);color:var(--text2);padding:4px 10px;font-size:11px;border-radius:6px}
.btn-copy.copied{background:#16a34a;color:#fff;border-color:#16a34a}
.tabs{display:flex;gap:4px;padding:4px;background:var(--bg3);border-radius:14px;margin-bottom:16px;overflow-x:auto}
.tab{display:flex;align-items:center;gap:6px;padding:10px 14px;border:none;background:transparent;color:var(--text2);border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--accent);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-header{text-align:center;font-size:12px;font-weight:600;padding:6px}
.cal-cell{min-height:72px;padding:5px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .15s}
.cal-cell.weekend{background:var(--bg3)}
.cal-cell.selected{border:2px solid var(--accent);background:var(--accent-light)}
.cal-cell .date{font-size:13px;font-weight:500}
.cal-cell .today{background:var(--accent);color:#fff;border-radius:6px;padding:1px 5px;font-size:11px;font-weight:700}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:11px;font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:16px}
.tag{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block}
.req-row{padding:8px 12px;margin-bottom:8px;border-radius:10px}
.msg-box{background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.msg-header{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3)}
.msg-body{margin:0;padding:10px 12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;font-family:'Noto Sans JP',sans-serif}
.toast{position:fixed;top:20px;right:20px;z-index:999;padding:12px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.setup-box{max-width:500px;margin:60px auto;padding:0 16px}
.setup-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px}
.info-box{padding:12px 16px;border-radius:10px;font-size:13px;line-height:1.7;margin-bottom:16px}
input[type="text"],input[type="date"],input[type="url"]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}
.all-copy{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:2px solid #16a34a;border-radius:10px;background:#f0fdf4;color:#16a34a;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%}
.all-copy.copied{background:#16a34a;color:#fff}
@media(max-width:600px){.container{padding:0 8px 30px}.header h1{font-size:17px}.cal-cell{min-height:64px;padding:3px}}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="app"></div>
<script>
const GAS_URL_KEY = 'sg-gas-url';
let gasUrl = localStorage.getItem(GAS_URL_KEY) || 'https://script.google.com/macros/s/AKfycbypqsFHT-OWUVXT6TROxDhqV0reFmqEzlSepTw0qhA6XvIxS9q3bebHFrq-tdiHkzigfQ/exec';
let appData = null;
let state = {
  tab: 'calendar',
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  selectedDate: null,
  loading: false,
  error: null,
  lastFetch: null,
  copiedId: null,
  toast: null
};

const DAY_NAMES = ['日','月','火','水','木','金','土'];
const now = new Date();
const formatDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayStr = formatDate(now);

function getMonthDays(y, m) {
  const days = []; const d = new Date(y, m, 1);
  while (d.getMonth() === m) { days.push(new Date(d)); d.setDate(d.getDate() + 1); }
  return days;
}

// Parse data
function parseGuards(raw) {
  return (raw||[]).map((g,i) => ({
    id: g['ID']||i+1, name: g['氏名']||'', qualifications: (g['保有資格']||'').split(',').map(s=>s.trim()).filter(Boolean),
    phone: g['電話番号']||'', lwId: g['LINE WORKS ID']||''
  }));
}
function parseRequests(raw) {
  return (raw||[]).map(r => ({
    id: r['依頼ID'], date: r['日付']||'', source: r['依頼元']||'', siteName: r['現場名']||'',
    address: r['住所']||'', count: r['必要人数']||0, meetTime: r['集合時間']||'',
    siteNotes: r['注意事項']||'', status: r['ステータス']||'未配置'
  }));
}
function parseAssignments(raw) {
  return (raw||[]).map(a => {
    const gs = [];
    for (let i=1;i<=10;i++){const n=a['配置者'+i];if(n)gs.push(n);}
    return { date:a['日付']||'', siteName:a['現場名']||'', required:a['必要人数']||0,
      guards:gs, extContractor:a['外部委託先']||'', extCount:a['外部委託人数']||0 };
  });
}
function parseDayoffs(raw) {
  return (raw||[]).map(d => ({
    guardName:d['警備員名']||'', date:d['日付']||'', endDate:d['終了日（連休時）']||'', reason:d['理由']||''
  }));
}

function getRequestsForDate(ds) { return parseRequests(appData?.requests).filter(r=>r.date===ds); }
function getAssignmentsForDate(ds) { return parseAssignments(appData?.assignments).filter(a=>a.date===ds); }
function getDayOffsForDate(ds) { return parseDayoffs(appData?.dayoffs).filter(d=>d.date===ds||(d.endDate&&d.date<=ds&&d.endDate>=ds)); }
function getTotalNeeded(ds) { return getRequestsForDate(ds).reduce((s,r)=>s+r.count,0); }
function getAssignedCount(ds) { return getAssignmentsForDate(ds).reduce((s,x)=>s+x.guards.length+x.extCount,0); }
function getShortage(ds) { return Math.max(0, getTotalNeeded(ds)-getAssignedCount(ds)); }

function generateMapUrl(addr) { return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(addr); }
function generateMessage(name, req, dateStr) {
  const l = [name+'さん','','明日の配置のご連絡です。','','【日付】'+dateStr,'【現場名】'+req.siteName];
  if(req.address){l.push('【住所】'+req.address,'【地図】'+generateMapUrl(req.address));}
  if(req.meetTime)l.push('【集合時間】'+req.meetTime);
  if(req.siteNotes)l.push('【注意事項】'+req.siteNotes);
  l.push('','安全第一でよろしくお願いします。','越前警備株式会社');
  return l.join('\n');
}

async function fetchData() {
  if(!gasUrl)return;
  state.loading=true; state.error=null; render();
  try {
    const res = await fetch(gasUrl+'?action=all');
    const json = await res.json();
    if(json.status==='ok'){appData=json.data;state.lastFetch=new Date();}
    else{state.error=json.message||'データ取得エラー';}
  } catch(e) { state.error='接続エラー: '+e.message; }
  state.loading=false; render();
}

function showToast(msg,type='success') {
  state.toast={msg,type}; render();
  setTimeout(()=>{state.toast=null;render();},2500);
}

async function copyText(text, id) {
  try{await navigator.clipboard.writeText(text);state.copiedId=id;showToast('コピーしました！');setTimeout(()=>{state.copiedId=null;render();},2000);}
  catch{showToast('コピー失敗','warning');}
}

function setTab(t){state.tab=t;render();}
function selectDate(ds){state.selectedDate=state.selectedDate===ds?null:ds;render();}
function prevMonth(){if(state.viewMonth===0){state.viewMonth=11;state.viewYear--;}else state.viewMonth--;render();}
function nextMonth(){if(state.viewMonth===11){state.viewMonth=0;state.viewYear++;}else state.viewMonth++;render();}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ===== RENDER =====
function render() {
  const app = document.getElementById('app');

  // Setup screen
  if(!gasUrl) {
    app.innerHTML = `
      <div class="setup-box">
        <div class="setup-card">
          <h1 style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:4px">警備員配置管理システム</h1>
          <p style="font-size:12px;color:var(--text2);margin-bottom:20px">越前警備株式会社</p>
          <div class="info-box" style="background:var(--accent-light);color:var(--accent)">
            Googleスプレッドシートと連携します。<br>
            GAS（Google Apps Script）のWeb API URLを貼り付けてください。
          </div>
          <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px">GAS Web API URL</label>
          <input type="url" id="gas-input" placeholder="https://script.google.com/macros/s/xxxxx/exec" style="margin-bottom:16px">
          <button class="btn btn-primary" style="width:100%;padding:12px;font-size:14px;border-radius:10px" onclick="connectGas()">接続する</button>
        </div>
      </div>`;
    return;
  }

  // Toast
  let toastHtml = '';
  if(state.toast) {
    const bg = state.toast.type==='warning'?'var(--warn)':'var(--success)';
    toastHtml = `<div class="toast" style="background:${bg}">${esc(state.toast.msg)}</div>`;
  }

  // Error
  let errorHtml = '';
  if(state.error) {
    errorHtml = `<div class="info-box" style="background:var(--danger-light);color:var(--danger);margin-bottom:12px">⚠ ${esc(state.error)}</div>`;
  }

  // Tabs
  const tabs = [
    {id:'calendar',icon:'📅',label:'カレンダー'},
    {id:'requests',icon:'📋',label:'依頼一覧'},
    {id:'message',icon:'💬',label:'LINE送信'}
  ];
  const tabsHtml = tabs.map(t=>`<button class="tab ${state.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.icon} ${t.label}</button>`).join('');

  let content = '';

  // CALENDAR
  if(state.tab==='calendar' && appData) {
    const days = getMonthDays(state.viewYear, state.viewMonth);
    const pad = days[0].getDay();

    let cells = '';
    for(let i=0;i<pad;i++) cells += '<div></div>';
    days.forEach(d => {
      const ds = formatDate(d);
      const needed = getTotalNeeded(ds);
      const shortage = getShortage(ds);
      const assigned = getAssignedCount(ds);
      const offCount = getDayOffsForDate(ds).length;
      const isToday = todayStr===ds;
      const isSel = state.selectedDate===ds;
      const isWe = d.getDay()===0||d.getDay()===6;
      const cls = 'cal-cell'+(isWe?' weekend':'')+(isSel?' selected':'');

      let dateLabel = isToday?`<span class="today">${d.getDate()}</span>`:d.getDate();
      let dayColor = d.getDay()===0?'var(--danger)':d.getDay()===6?'var(--accent)':'var(--text)';

      let info = '';
      if(offCount>0) info += `<div style="font-size:10px;color:#9333ea;font-weight:600">休${offCount}</div>`;
      if(needed>0) {
        info += `<div style="font-size:10px;color:var(--text2);margin-top:${offCount?0:3}px">要${needed} 済${assigned}</div>`;
        info += shortage>0
          ? `<div style="font-size:10px;font-weight:700;color:var(--danger)">不足${shortage}</div>`
          : `<div style="font-size:10px;font-weight:600;color:var(--success)">OK</div>`;
      }

      cells += `<div class="${cls}" onclick="selectDate('${ds}')"><div class="date" style="color:${dayColor}">${dateLabel}</div>${info}</div>`;
    });

    // Date detail
    let detail = '';
    if(state.selectedDate) {
      const sd = state.selectedDate;
      const offs = getDayOffsForDate(sd);
      const reqs = getRequestsForDate(sd);
      const assigns = getAssignmentsForDate(sd);

      let offHtml = '';
      if(offs.length>0) {
        const tags = offs.map(o=>`<span class="tag" style="background:#ede9fe;color:#6d28d9">${esc(o.guardName)}${o.reason?' ('+esc(o.reason)+')':''}</span>`).join(' ');
        offHtml = `<div style="margin-bottom:10px;padding:8px 12px;border-radius:10px;background:#f3e8ff;border:1px solid #d8b4fe">
          <div style="font-size:12px;font-weight:600;color:#7c3aed;margin-bottom:4px">休暇 (${offs.length}名)</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${tags}</div></div>`;
      }

      let reqHtml = '';
      if(reqs.length===0) reqHtml = '<p style="color:var(--text2);font-size:13px">依頼なし</p>';
      reqs.forEach(r => {
        const bg = r.source==='グループ'?'#ecfdf5':'#fef3c7';
        const bd = r.source==='グループ'?'#a7f3d0':'#fde68a';
        const srcBg = r.source==='グループ'?'#059669':'#d97706';
        const stBg = r.status==='配置済'?'var(--success-light)':r.status==='未配置'?'var(--danger-light)':'var(--warn-light)';
        const stColor = r.status==='配置済'?'var(--success)':r.status==='未配置'?'var(--danger)':'var(--warn)';
        let addrInfo = '';
        if(r.address) {
          addrInfo = `<div style="margin-top:4px;font-size:11px;color:var(--text2)">📍 ${esc(r.address)}${r.meetTime?' | 集合: '+esc(r.meetTime):''}${r.siteNotes?' | 注意: '+esc(r.siteNotes):''}</div>`;
        }
        reqHtml += `<div class="req-row" style="background:${bg};border:1px solid ${bd}">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="badge" style="background:${srcBg};color:#fff">${esc(r.source)}</span>
            <span style="font-size:13px;font-weight:600">${esc(r.siteName)}</span>
            <span style="font-size:12px;color:var(--text2)">${r.count}名</span>
            <span class="badge" style="background:${stBg};color:${stColor}">${esc(r.status)}</span>
          </div>${addrInfo}</div>`;
      });

      let assignHtml = '';
      if(assigns.length>0) {
        let tags = '';
        assigns.forEach(a => {
          a.guards.forEach(g => { tags += `<span class="tag" style="background:var(--accent-light);color:var(--accent)">${esc(g)}</span> `; });
          if(a.extContractor) tags += `<span class="tag" style="background:var(--warn-light);color:var(--warn)">${esc(a.extContractor)}(${a.extCount}名)</span> `;
        });
        assignHtml = `<div style="margin-top:8px"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">配置済み</div><div style="display:flex;flex-wrap:wrap;gap:4px">${tags}</div></div>`;
      }

      detail = `<div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px">${sd}</h3>${offHtml}${reqHtml}${assignHtml}</div>`;
    }

    content = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <button class="btn btn-outline" onclick="prevMonth()">◀</button>
        <h2 style="font-size:18px;font-weight:700">${state.viewYear}年${state.viewMonth+1}月</h2>
        <button class="btn btn-outline" onclick="nextMonth()">▶</button>
      </div>
      <div class="cal-grid" style="margin-bottom:2px">
        ${DAY_NAMES.map((d,i)=>`<div class="cal-header" style="color:${i===0?'var(--danger)':i===6?'var(--accent)':'var(--text2)'}">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
      ${detail}`;
  }

  // REQUESTS
  if(state.tab==='requests' && appData) {
    const reqs = parseRequests(appData.requests).sort((a,b)=>a.date.localeCompare(b.date));
    let rows = '';
    if(reqs.length===0) rows = '<p style="color:var(--text2);text-align:center;padding:40px">依頼なし</p>';
    reqs.forEach(r => {
      const srcBg = r.source==='グループ'?'#059669':'#d97706';
      const stBg = r.status==='配置済'?'var(--success-light)':'var(--danger-light)';
      const stColor = r.status==='配置済'?'var(--success)':'var(--danger)';
      rows += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;margin-bottom:6px;border-radius:12px;background:var(--bg2);border:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="badge" style="background:${srcBg};color:#fff">${esc(r.source)}</span>
          <span style="font-size:13px;font-weight:600">${esc(r.siteName)}</span>
          <span style="font-size:12px;color:var(--text2)">${esc(r.date)}</span>
          <span style="font-size:12px;color:var(--text2)">${r.count}名</span>
        </div>
        <span class="badge" style="background:${stBg};color:${stColor}">${esc(r.status)}</span>
      </div>`;
    });
    content = `<h2 style="font-size:18px;font-weight:700;margin-bottom:12px">依頼一覧（${reqs.length}件）</h2>${rows}`;
  }

  // LINE WORKS MESSAGE
  if(state.tab==='message' && appData) {
    const sd = state.selectedDate || '';
    let msgContent = '';

    if(sd) {
      const reqs = getRequestsForDate(sd);
      const assigns = getAssignmentsForDate(sd);
      const allGuards = assigns.flatMap(a=>a.guards);

      if(reqs.length===0) {
        msgContent = '<p style="color:var(--text2);padding:20px;text-align:center">この日の依頼はありません</p>';
      } else if(allGuards.length===0) {
        msgContent = '<p style="color:var(--text2);padding:20px;text-align:center">配置がまだありません<br><span style="font-size:12px">スプレッドシートの配置表に入力してから「更新」を押してください</span></p>';
      } else {
        const req = reqs[0];
        let warnHtml = '';
        if(!req.address) {
          warnHtml = '<div class="info-box" style="background:var(--warn-light);color:#92400e;margin-bottom:12px">⚠ 住所が未登録です。スプレッドシートの「配置依頼」シートに住所を入力してから「更新」ボタンを押してください。</div>';
        }

        let siteInfo = `<div style="padding:12px 16px;border-radius:12px;background:#f0fdf4;border:1px solid #bbf7d0;margin-bottom:12px">
          <div style="font-size:13px;font-weight:600;color:#16a34a;margin-bottom:6px">現場情報</div>
          <div style="font-size:13px;line-height:1.8">
            <div>現場: ${esc(req.siteName)}</div>
            ${req.address?'<div>住所: '+esc(req.address)+'</div>':''}
            ${req.meetTime?'<div>集合: '+esc(req.meetTime)+'</div>':''}
            ${req.siteNotes?'<div>注意: '+esc(req.siteNotes)+'</div>':''}
          </div></div>`;

        let cards = '';
        allGuards.forEach((g,i) => {
          const msg = generateMessage(g, req, sd);
          const isCopied = state.copiedId === 'msg-'+i;
          cards += `<div class="msg-box">
            <div class="msg-header">
              <span style="font-size:13px;font-weight:600">${esc(g)}</span>
              <button class="btn-copy ${isCopied?'copied':''}" onclick="copyMsg(${i},'${sd}')">${isCopied?'✓ コピー済':'📋 コピー'}</button>
            </div>
            <pre class="msg-body">${esc(msg)}</pre>
          </div>`;
        });

        const allCopied = state.copiedId==='all-msgs';
        cards += `<button class="all-copy ${allCopied?'copied':''}" onclick="copyAll('${sd}')">${allCopied?'✓ 全員分コピー済':'📋 全員分を一括コピー'}</button>`;

        msgContent = warnHtml + siteInfo + cards;
      }
    }

    content = `
      <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">LINE WORKS 送信メッセージ</h2>
      <p style="font-size:12px;color:var(--text2);margin-bottom:16px">日付を選択 → 配置済み警備員のメッセージを生成</p>
      <div style="margin-bottom:16px">
        <label style="font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px">対象日付</label>
        <input type="date" id="msg-date" value="${sd}" onchange="state.selectedDate=this.value;render()" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px">
      </div>
      ${msgContent}`;
  }

  // Loading
  if(state.loading && !appData) content = '<div style="text-align:center;padding:40px;color:var(--text2)">データ読み込み中...</div>';

  const lastStr = state.lastFetch ? ' | 最終取得: '+state.lastFetch.toLocaleTimeString('ja-JP') : '';

  app.innerHTML = `${toastHtml}
    <div class="container">
      <div class="header">
        <div><h1>警備員配置管理</h1><p>越前警備${lastStr}</p></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline" onclick="fetchData()">🔄 ${state.loading?'取得中...':'更新'}</button>
          <button class="btn btn-outline" onclick="resetUrl()">⚙</button>
        </div>
      </div>
      ${errorHtml}
      <div class="tabs">${tabsHtml}</div>
      ${content}
    </div>`;
}

// Global functions
function connectGas() {
  const v = document.getElementById('gas-input').value.trim();
  if(v){gasUrl=v;localStorage.setItem(GAS_URL_KEY,v);fetchData();}
}
function resetUrl(){gasUrl='';localStorage.removeItem(GAS_URL_KEY);appData=null;render();}

function copyMsg(idx, sd) {
  const reqs=getRequestsForDate(sd);const assigns=getAssignmentsForDate(sd);
  const allGuards=assigns.flatMap(a=>a.guards);
  if(reqs[0]&&allGuards[idx]){const msg=generateMessage(allGuards[idx],reqs[0],sd);copyText(msg,'msg-'+idx);}
}
function copyAll(sd) {
  const reqs=getRequestsForDate(sd);const assigns=getAssignmentsForDate(sd);
  const allGuards=assigns.flatMap(a=>a.guards);
  if(reqs[0]&&allGuards.length){
    const all=allGuards.map(g=>generateMessage(g,reqs[0],sd)).join('\n\n---\n\n');
    copyText(all,'all-msgs');
  }
}

// Init
render();
if(gasUrl) fetchData();
</script>
</body>
</html>
