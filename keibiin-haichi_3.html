<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>警備員配置案内文</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif;
    background: #f0f4f8;
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }
  h1 {
    font-size: 17px;
    text-align: center;
    color: #1a3a5c;
    background: #fff;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 16px;
    border-left: 5px solid #2979ff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .section-title {
    font-size: 13px;
    font-weight: bold;
    color: #2979ff;
    margin-bottom: 10px;
    border-bottom: 1px solid #e3eaf5;
    padding-bottom: 6px;
  }
  label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 3px;
    margin-top: 10px;
  }
  label:first-of-type { margin-top: 0; }
  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d0dae8;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #f8fafd;
    transition: border 0.2s;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #2979ff;
    background: #fff;
  }
  textarea { resize: vertical; min-height: 70px; }
  .staff-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .staff-row input { flex: 1; }
  .remove-btn {
    background: #ff5252;
    color: #fff;
    border: none;
    border-radius: 6px;
    width: 32px;
    height: 36px;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .add-btn {
    background: #e8f1ff;
    color: #2979ff;
    border: 1.5px dashed #2979ff;
    border-radius: 8px;
    width: 100%;
    padding: 9px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-row { display: flex; gap: 10px; }
  .btn-generate {
    background: linear-gradient(135deg, #2979ff, #1565c0);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    flex: 1;
    box-shadow: 0 3px 10px rgba(41,121,255,0.3);
  }
  .btn-clear {
    background: #eceff1;
    color: #546e7a;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    cursor: pointer;
    width: 80px;
  }
  .output-area {
    display: none;
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-top: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .output-area h2 { font-size: 13px; color: #2979ff; margin-bottom: 10px; }
  .preview-box {
    background: #f4f8ff;
    border: 1.5px solid #d0dae8;
    border-radius: 8px;
    padding: 14px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .copy-btn {
    background: #00c853;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
  }
  .toast {
    display: none;
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #323232;
    color: #fff;
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 13px;
    z-index: 999;
  }
  .format-tabs { display: flex; gap: 8px; margin-bottom: 4px; }
  .tab-btn {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: 1.5px solid #d0dae8;
    background: #f0f4f8;
    color: #666;
    font-size: 12px;
    cursor: pointer;
  }
  .tab-btn.active { background: #2979ff; color: #fff; border-color: #2979ff; }
</style>
</head>
<body>

<h1>🦺 警備員配置案内文　作成ツール</h1>

<div class="card">
  <div class="section-title">📋 フォーマット選択</div>
  <div class="format-tabs">
    <button class="tab-btn active" id="tab-standard" onclick="setFormat('standard')">標準版</button>
    <button class="tab-btn" id="tab-simple" onclick="setFormat('simple')">簡易版</button>
    <button class="tab-btn" id="tab-urgent" onclick="setFormat('urgent')">緊急配置版</button>
  </div>
</div>

<div class="card">
  <div class="section-title">📅 基本情報</div>
  <label>日程</label>
  <input type="date" id="date-picker" onchange="updateDate()" style="color:#333;">
  <input type="text" id="date" placeholder="カレンダーから選択してください" style="margin-top:6px;background:#f0f6ff;color:#1a3a5c;font-weight:bold;" readonly>
  <label>現場名</label>
  <input type="text" id="site" placeholder="例：〇〇道路工事現場">
  <label>現場住所</label>
  <input type="text" id="address" placeholder="例：福井市〇〇町〇〇番地">
  <label>Googleマップ URL（任意）</label>
  <input type="url" id="mapurl" placeholder="https://maps.app.goo.gl/...">
</div>

<div class="card">
  <div class="section-title">🕐 勤務情報</div>
  <label>集合時間</label>
  <input type="text" id="meettime" placeholder="例：07:30">
  <label>業務開始時間</label>
  <input type="text" id="starttime" placeholder="例：08:00">
  <label>業務終了時間（目安）</label>
  <input type="text" id="endtime" placeholder="例：17:00">
  <label>監督名</label>
  <input type="text" id="supervisor" placeholder="例：〇〇　〇〇　監督">
  <label>監督連絡先（任意）</label>
  <input type="text" id="supervisortel" placeholder="例：090-XXXX-XXXX">
</div>

<div class="card">
  <div class="section-title">👷 配置人員</div>
  <div id="staff-list">
    <div class="staff-row">
      <input type="text" placeholder="例：田中　太郎">
      <button class="remove-btn" onclick="removeStaff(this)">×</button>
    </div>
  </div>
  <button class="add-btn" onclick="addStaff()">＋ 人員を追加</button>
</div>

<div class="card">
  <div class="section-title">📝 備考・持ち物</div>
  <textarea id="notes" placeholder="例：無線機持参、雨具持参、弁当持参 など"></textarea>
</div>

<div class="card">
  <div class="btn-row">
    <button class="btn-generate" onclick="generate()">📝 案内文を生成</button>
    <button class="btn-clear" onclick="clearAll()">クリア</button>
  </div>
</div>

<div class="output-area" id="output">
  <h2>✅ 生成された案内文（コピーしてLINE WORKSへ貼付け）</h2>
  <div class="preview-box" id="preview"></div>
  <button class="copy-btn" onclick="copyText()">📋 コピーする</button>
</div>

<div class="toast" id="toast">コピーしました！</div>

<script>
var currentFormat = 'standard';

var YOUBI = ['日','月','火','水','木','金','土'];

function updateDate() {
  var picker = document.getElementById('date-picker');
  var val = picker.value; // "2025-05-10"
  if (!val) return;
  var parts = val.split('-');
  var y = parseInt(parts[0]);
  var m = parseInt(parts[1]);
  var d = parseInt(parts[2]);
  var dow = new Date(y, m-1, d).getDay();
  var reiwa = y - 2018;
  var str = '令和' + reiwa + '年' + m + '月' + d + '日（' + YOUBI[dow] + '）';
  document.getElementById('date').value = str;
}

function setFormat(f) {
  currentFormat = f;
  document.getElementById('tab-standard').className = 'tab-btn';
  document.getElementById('tab-simple').className = 'tab-btn';
  document.getElementById('tab-urgent').className = 'tab-btn';
  document.getElementById('tab-' + f).className = 'tab-btn active';
}

function addStaff() {
  var list = document.getElementById('staff-list');
  var row = document.createElement('div');
  row.className = 'staff-row';
  row.innerHTML = '<input type="text" placeholder="氏名を入力"><button class="remove-btn" onclick="removeStaff(this)">×</button>';
  list.appendChild(row);
}

function removeStaff(btn) {
  var rows = document.querySelectorAll('.staff-row');
  if (rows.length > 1) {
    btn.parentElement.remove();
  }
}

function getStaffList() {
  var inputs = document.querySelectorAll('.staff-row input');
  var result = [];
  for (var i = 0; i < inputs.length; i++) {
    var v = inputs[i].value.trim();
    if (v) result.push(v);
  }
  return result;
}

function todayStr() {
  var d = new Date();
  var y = d.getFullYear() - 2018;
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return '令和' + y + '年' + m + '月' + day + '日';
}

function generate() {
  var date      = document.getElementById('date').value.trim() || todayStr();
  // date-pickerから自動変換された値を優先使用
  var site      = document.getElementById('site').value.trim();
  var address   = document.getElementById('address').value.trim();
  var mapurl    = document.getElementById('mapurl').value.trim();
  var meettime  = document.getElementById('meettime').value.trim();
  var starttime = document.getElementById('starttime').value.trim();
  var endtime   = document.getElementById('endtime').value.trim();
  var supervisor= document.getElementById('supervisor').value.trim();
  var supertel  = document.getElementById('supervisortel').value.trim();
  var notes     = document.getElementById('notes').value.trim();
  var staff     = getStaffList();

  if (!site || !meettime) {
    alert('現場名と集合時間は必須です！');
    return;
  }

  var t = '';

  if (currentFormat === 'standard') {
    t += '【警備員配置のご案内】\n';
    t += '━━━━━━━━━━━━━━\n';
    t += 'お疲れ様です。越前警備です。\n';
    t += '以下のとおり現場配置をご連絡いたします。\n\n';
    t += '📅 日　程：' + date + '\n';
    t += '🏗️ 現場名：' + site + '\n';
    t += '📍 住　所：' + (address || '（現場住所）') + '\n';
    if (mapurl) t += '🗺️ マップ：' + mapurl + '\n';
    t += '\n';
    t += '🕐 集合時間：' + meettime + '\n';
    if (starttime) t += '▶️ 業務開始：' + starttime + '\n';
    if (endtime)   t += '⏹️ 業務終了：' + endtime + '（目安）\n';
    t += '\n';
    if (notes) t += '📝 備　考：' + notes + '\n\n';
    t += '👷 配置人員（' + staff.length + '名）\n';
    if (staff.length > 0) {
      for (var i = 0; i < staff.length; i++) t += '　' + (i+1) + '. ' + staff[i] + '\n';
    } else {
      t += '　（未入力）\n';
    }
    t += '\n';
    if (supervisor) {
      t += '📋 現場監督：' + supervisor + '\n';
      if (supertel) t += '　TEL：' + supertel + '\n';
    }
    t += '━━━━━━━━━━━━━━\n';
    t += '⚠️ 遅刻・欠席の場合は必ず前日までにご連絡ください。\n';
    t += 'ご確認いただきましたら「確認しました」とご返信お願いします🙏';

  } else if (currentFormat === 'simple') {
    t += '📢 配置連絡\n\n';
    t += '【' + site + '】\n';
    t += '📅 ' + date + '\n';
    t += '📍 ' + (address || '（住所）') + '\n';
    if (mapurl) t += '🗺️ ' + mapurl + '\n';
    t += '🕐 集合 ' + meettime + '\n';
    if (starttime) t += '▶️ 開始 ' + starttime;
    if (endtime)   t += '　⏹️ 終了 ' + endtime + '（目安）';
    if (starttime || endtime) t += '\n';
    if (supervisor) {
      t += '👤 監督：' + supervisor;
      if (supertel) t += '　📞 ' + supertel;
      t += '\n';
    }
    if (staff.length > 0) t += '\n👷 配置：' + staff.join('、') + '\n';
    if (notes) t += '📝 ' + notes + '\n';
    t += '\n✅ 確認したら返信してください！';

  } else {
    t += '🚨【緊急配置のご連絡】🚨\n';
    t += '━━━━━━━━━━━━━━\n';
    t += 'お疲れ様です。急なご連絡となり申し訳ありません。\n';
    t += '緊急で警備員の配置をお願いしたく、ご連絡いたします。\n\n';
    t += '📅 日　程：' + date + '\n';
    t += '🏗️ 現場名：' + site + '\n';
    t += '📍 住　所：' + (address || '（現場住所）') + '\n';
    if (mapurl) t += '🗺️ マップ：' + mapurl + '\n';
    t += '\n';
    t += '⏰ 集合時間：' + meettime + '　※厳守\n';
    if (starttime) t += '▶️ 業務開始：' + starttime + '\n';
    if (endtime)   t += '⏹️ 業務終了：' + endtime + '（目安）\n';
    t += '\n';
    if (notes) t += '📝 備　考：' + notes + '\n\n';
    if (staff.length > 0) {
      t += '👷 対象者（' + staff.length + '名）\n';
      for (var j = 0; j < staff.length; j++) t += '　' + (j+1) + '. ' + staff[j] + '\n';
      t += '\n';
    }
    if (supervisor) {
      t += '📋 現場監督：' + supervisor + '\n';
      if (supertel) t += '　TEL：' + supertel + '\n';
    }
    t += '━━━━━━━━━━━━━━\n';
    t += '❗ 対応可否を【本日中】にご返信ください。\n';
    t += 'よろしくお願いいたします。';
  }

  document.getElementById('preview').textContent = t;
  document.getElementById('output').style.display = 'block';
  document.getElementById('output').scrollIntoView({ behavior: 'smooth' });
}

function copyText() {
  var text = document.getElementById('preview').textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(showToast);
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  }
}

function showToast() {
  var toast = document.getElementById('toast');
  toast.style.display = 'block';
  setTimeout(function() { toast.style.display = 'none'; }, 2000);
}

function clearAll() {
  document.getElementById('date-picker').value = '';
  var ids = ['date','site','address','mapurl','meettime','starttime','endtime','supervisor','supervisortel','notes'];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = '';
  document.getElementById('staff-list').innerHTML =
    '<div class="staff-row"><input type="text" placeholder="例：田中　太郎"><button class="remove-btn" onclick="removeStaff(this)">×</button></div>';
  document.getElementById('output').style.display = 'none';
}
</script>
</body>
</html>
